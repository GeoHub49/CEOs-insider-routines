name: Sophia — Consensus

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --quiet anthropic python-dotenv

      - name: Run Sophia
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SOPHIA_MIN_AGREE: "3"
        run: python agents/sophia.py

      - name: Persist state DB
        run: |
          git config user.name  "insider-bot"
          git config user.email "insider-bot@users.noreply.github.com"
          git add .state/state.db || true
          git diff --cached --quiet || git commit -m "chore: sophia consensus [skip ci]"
          git push
