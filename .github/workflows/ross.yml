name: Ross — Dispatcher

on:
  schedule:
    - cron: "15,45 * * * *"  # every 30 min, offset from Sophie
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --quiet google-generativeai python-dotenv

      - name: Run Ross
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agents/ross.py

      - name: Persist state DB
        run: |
          git config user.name  "insider-bot"
          git config user.email "insider-bot@users.noreply.github.com"
          git add .state/state.db || true
          git diff --cached --quiet || git commit -m "chore: ross dispatch [skip ci]"
          git push
